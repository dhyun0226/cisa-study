<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CISA 스터디 허브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fa;
  --bg2:#eef1f6;
  --card:#ffffff;
  --card2:#f8fafc;
  --primary:#2563eb;
  --pl:#1d4ed8;
  --primary-light:#eff6ff;
  --primary-mid:#bfdbfe;
  --success:#059669;
  --success-light:#ecfdf5;
  --success-mid:#a7f3d0;
  --danger:#dc2626;
  --danger-light:#fef2f2;
  --danger-mid:#fecaca;
  --warn:#d97706;
  --warn-light:#fffbeb;
  --warn-mid:#fde68a;
  --text:#111827;
  --text2:#374151;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --border:#e5e7eb;
  --border2:#d1d5db;
  --purple:#7c3aed;
  --purple-light:#f5f3ff;
  --purple-mid:#ddd6fe;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 8px 24px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
}
body{
  font-family:'Noto Sans KR','DM Sans',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.7;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
.hdr{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:.875rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-sm);
}
.hdr h1{
  font-family:'DM Sans','Noto Sans KR',sans-serif;
  font-size:1.35rem;font-weight:700;
  color:var(--primary);
  letter-spacing:-.02em;
}
.hdr h1 span{color:var(--text);font-weight:600}
.hdr-stats{display:flex;gap:1.5rem;font-size:.82rem;color:var(--muted)}
.hdr-stats .v{color:var(--text2);font-weight:700}

/* ── TABS ── */
.tabs{
  display:flex;
  background:#fff;
  border-bottom:2px solid var(--border);
  padding:0 2rem;
  overflow-x:auto;
  gap:.25rem;
}
.tabs::-webkit-scrollbar{height:0}
.tab{
  padding:.8rem 1.25rem;
  cursor:pointer;
  color:var(--muted);
  border-bottom:2px solid transparent;
  margin-bottom:-2px;
  font-size:.875rem;
  font-weight:500;
  white-space:nowrap;
  transition:color .15s,border-color .15s;
  letter-spacing:.01em;
}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ── MAIN LAYOUT ── */
.main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.pane{display:none}.pane.on{display:block}

/* ── CARD ── */
.card{
  background:var(--card);
  border-radius:12px;
  padding:2rem;
  margin-bottom:1.5rem;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BADGES ── */
.meta{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.bg{padding:.2rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.bg-d{background:var(--primary-light);color:var(--primary);border:1px solid var(--primary-mid)}
.bg-k{background:#f3f4f6;color:var(--muted);border:1px solid var(--border2)}
.bg-r{background:var(--warn-light);color:var(--warn);border:1px solid var(--warn-mid)}
.bg-w{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger-mid)}
.bg-s{background:var(--warn-light);color:var(--warn);border:1px solid var(--warn-mid);cursor:pointer;transition:background .15s}
.bg-s:hover{background:var(--warn-mid)}

/* ── QUESTION ── */
.qtxt{
  font-size:1.1rem;
  line-height:1.85;
  margin-bottom:1.5rem;
  font-weight:500;
  color:var(--text);
  word-break:keep-all;
}
.opts{display:flex;flex-direction:column;gap:.625rem}
.opt{
  padding:.875rem 1.125rem;
  border-radius:10px;
  border:1.5px solid var(--border);
  cursor:pointer;
  transition:border-color .15s,background .15s,box-shadow .15s;
  display:flex;align-items:flex-start;gap:.75rem;
  background:#fff;
}
.opt:hover:not(.dis){border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 3px rgba(37,99,235,.06)}
.opt.ok{border-color:var(--success);background:var(--success-light)}
.opt.no{border-color:var(--danger);background:var(--danger-light)}
.opt.dis{cursor:default}
.ol{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.78rem;flex-shrink:0;
  background:var(--bg2);color:var(--muted);
  border:1.5px solid var(--border2);
}
.opt:hover:not(.dis) .ol{background:var(--primary-mid);color:var(--primary);border-color:var(--primary)}
.opt.ok .ol{background:var(--success);color:#fff;border-color:var(--success)}
.opt.no .ol{background:var(--danger);color:#fff;border-color:var(--danger)}
.ot{padding-top:.1rem;line-height:1.6;color:var(--text2);font-size:.9rem;word-break:keep-all}

/* ── EXPLANATION ── */
.expl{
  margin-top:1.5rem;padding:1.5rem;
  border-radius:10px;
  background:var(--primary-light);
  border:1px solid var(--primary-mid);
  display:none;
}
.expl.show{display:block}
.expl h3{color:var(--primary);margin-bottom:.875rem;font-size:.95rem;font-weight:700;letter-spacing:.01em}
.expl-c{line-height:1.9;color:var(--text2)}
.expl-c p{margin-bottom:.75rem;word-break:keep-all}
.expl-c strong{color:var(--text);font-weight:600}

/* callout boxes in explanation */
.kp{
  background:var(--success-light);
  border-left:3px solid var(--success);
  padding:.75rem 1rem;margin:.75rem 0;
  border-radius:0 8px 8px 0;
  color:var(--text2);
  font-size:.9rem;
}
.wp{
  background:var(--danger-light);
  border-left:3px solid var(--danger);
  padding:.75rem 1rem;margin:.75rem 0;
  border-radius:0 8px 8px 0;
  color:var(--text2);
  font-size:.9rem;
}

/* ── TABLES ── */
.expl-c table,.cb table{
  width:100%;border-collapse:collapse;margin:1rem 0;font-size:.875rem;
  box-shadow:var(--shadow-sm);border-radius:8px;overflow:hidden;
}
.expl-c th,.cb th{
  background:var(--primary);color:#fff;
  padding:.625rem 1rem;text-align:left;font-weight:600;
  border:none;
}
.expl-c td,.cb td{
  padding:.5rem 1rem;
  border-bottom:1px solid var(--border);
  color:var(--text2);
}
.expl-c tr:nth-child(even) td,.cb tr:nth-child(even) td{background:var(--bg2)}
.expl-c tr:hover td,.cb tr:hover td{background:var(--primary-light)}
.expl-c tr:last-child td,.cb tr:last-child td{border-bottom:none}

/* ── SUMMARY BOX ── */
.sbox{
  background:var(--purple-light);
  border:1px solid var(--purple-mid);
  border-radius:10px;padding:1.25rem;margin:1rem 0;
}
.sbox h4{color:var(--purple);margin-bottom:.75rem;font-weight:700;font-size:.9rem}
.sbox ul{padding-left:1.25rem;color:var(--text2)}
.sbox li{margin-bottom:.4rem;line-height:1.7;font-size:.9rem}
.sbox li strong{color:var(--text)}

/* ── REFERENCE BOX ── */
.rbox{
  margin-top:1rem;padding:1rem 1.25rem;
  border-radius:10px;
  background:var(--warn-light);
  border:1px solid var(--warn-mid);
  display:none;
}
.rbox.show{display:block}
.rbox h4{color:var(--warn);margin-bottom:.5rem;font-size:.85rem;font-weight:700}
.rbox ul{padding-left:1.25rem;color:var(--text2);font-size:.875rem}
.rbox li{margin-bottom:.3rem}

/* ── KEY CONCEPT BOX ── */
.kcbox{
  margin-top:1rem;padding:1rem 1.25rem;
  border-radius:10px;
  background:var(--purple-light);
  border:1px solid var(--purple-mid);
  display:none;
}
.kcbox.show{display:block}
.kcbox h4{color:var(--purple);margin-bottom:.75rem;font-size:.875rem;font-weight:700}
.ci{
  margin-bottom:.5rem;padding:.625rem .875rem;
  border-left:2px solid var(--purple-mid);
  font-size:.875rem;color:var(--text2);
  background:#fff;
  border-radius:0 8px 8px 0;
  line-height:1.7;
  word-break:keep-all;
}
.ci strong{color:var(--purple);font-weight:600}

/* ── BUTTONS ── */
.btn{
  padding:.6rem 1.375rem;
  border-radius:8px;border:none;cursor:pointer;
  font-weight:600;font-size:.875rem;
  transition:background .15s,box-shadow .15s,transform .1s;
  letter-spacing:.01em;
  font-family:inherit;
}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--primary);color:#fff;box-shadow:0 1px 3px rgba(37,99,235,.3)}
.btn-p:hover{background:var(--pl);box-shadow:0 2px 8px rgba(37,99,235,.35)}
.btn-o{
  background:#fff;color:var(--muted);
  border:1.5px solid var(--border2);
}
.btn-o:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-s{background:var(--success);color:#fff;box-shadow:0 1px 3px rgba(5,150,105,.25)}
.btn-s:hover{background:#047857}

/* ── QUIZ ACTIONS ── */
.qact{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem}
.qprog{color:var(--muted);font-size:.85rem;font-weight:500}

/* ── FILTER BAR ── */
.fbar{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.fchip{
  padding:.35rem .875rem;border-radius:20px;font-size:.78rem;cursor:pointer;
  border:1.5px solid var(--border2);background:#fff;
  color:var(--muted);transition:all .15s;font-weight:500;
}
.fchip:hover{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.fchip.on{border-color:var(--primary);background:var(--primary);color:#fff}

/* ── SEARCH ── */
.csearch{
  width:100%;padding:.875rem 1.25rem;
  border-radius:10px;border:1.5px solid var(--border2);
  background:#fff;color:var(--text);
  font-size:.95rem;margin-bottom:1.5rem;
  font-family:inherit;
  box-shadow:var(--shadow-sm);
  transition:border-color .15s,box-shadow .15s;
}
.csearch:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.csearch::placeholder{color:var(--muted2)}

/* ── DOMAIN SECTIONS ── */
.dsec{margin-bottom:1.5rem}
.dhdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.875rem 1.375rem;
  background:#fff;
  border-radius:10px 10px 0 0;
  border:1px solid var(--border);
  cursor:pointer;user-select:none;
  box-shadow:var(--shadow-sm);
}
.dhdr h2{font-size:.975rem;font-weight:600;color:var(--text)}
.dhdr .tgl{color:var(--muted2);font-size:1rem;transition:transform .2s}
.dhdr.off .tgl{transform:rotate(-90deg)}
.dbody{
  padding:1.375rem;
  background:var(--card2);
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 10px 10px;
}
.dbody.off{display:none}

/* ── CONCEPT ENTRIES ── */
.ce{
  padding:1.125rem;border-radius:8px;
  background:#fff;margin-bottom:.625rem;
  border-left:3px solid var(--primary);
  border:1px solid var(--border);
  border-left:3px solid var(--primary);
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s;
}
.ce:hover{box-shadow:var(--shadow)}
.ce h4{color:var(--primary);margin-bottom:.4rem;font-size:.95rem;font-weight:600}
.ce p{color:var(--text2);line-height:1.85;font-size:.875rem;word-break:keep-all}
.ce .tgs{margin-top:.625rem;display:flex;gap:.375rem;flex-wrap:wrap}
.ctag{
  font-size:.7rem;padding:.15rem .5rem;border-radius:10px;
  background:var(--purple-light);color:var(--purple);
  border:1px solid var(--purple-mid);
}

/* ── MEMO CARDS ── */
.mc{
  background:#fff;
  border:1.5px solid var(--border);
  border-radius:12px;padding:1.375rem;margin-bottom:.875rem;
  cursor:pointer;transition:box-shadow .2s,border-color .2s;
  box-shadow:var(--shadow-sm);
}
.mc:hover{border-color:var(--primary-mid);box-shadow:var(--shadow)}
.mc .mq{font-weight:600;margin-bottom:.625rem;font-size:.975rem;color:var(--text);line-height:1.7;word-break:keep-all}
.mc .ma{
  color:var(--text2);line-height:1.85;font-size:.875rem;
  max-height:0;overflow:hidden;transition:max-height .35s ease;
  word-break:keep-all;
}
.mc.open .ma{max-height:800px}
.mc .rh{color:var(--primary);font-size:.78rem;margin-top:.5rem;font-weight:500}
.mc.open .rh{display:none}
.mc.open{border-color:var(--primary-mid);background:var(--primary-light)}

/* ── SUMMARY STATS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.sc{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:1.375rem;text-align:center;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s;
}
.sc:hover{box-shadow:var(--shadow)}
.sc .n{font-size:2rem;font-weight:700;margin-bottom:.25rem;font-family:'DM Sans',sans-serif}
.sc .l{color:var(--muted);font-size:.8rem;font-weight:500}

/* ── FORMS ── */
.fg{margin-bottom:1.25rem}
.fg label{display:block;margin-bottom:.4rem;color:var(--text2);font-size:.82rem;font-weight:600}
.fg input,.fg textarea,.fg select{
  width:100%;padding:.75rem 1rem;
  border-radius:8px;border:1.5px solid var(--border2);
  background:#fff;color:var(--text);
  font-size:.9rem;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
.fg textarea{min-height:100px;resize:vertical}
.fg input:focus,.fg textarea:focus,.fg select:focus{
  outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.oig{display:flex;gap:.75rem;align-items:center;margin-bottom:.5rem}
.oig input[type="text"]{flex:1}
.oig input[type="radio"]{width:18px;height:18px;accent-color:var(--success)}

/* ── CHEAT SHEET ── */
.cs-domain{margin-bottom:2.5rem}
.cs-domain-title{
  font-size:1.1rem;font-weight:700;color:var(--primary);
  padding-bottom:.625rem;
  border-bottom:2px solid var(--primary-mid);
  margin-bottom:1.25rem;
  font-family:'DM Sans',sans-serif;
}
.cs-topic{
  margin-bottom:1.25rem;padding:1.25rem;
  background:#fff;border-radius:10px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}
.cs-topic-title{
  font-size:.95rem;font-weight:700;
  color:var(--warn);margin-bottom:.875rem;
  display:flex;align-items:center;gap:.5rem;
}
.cs-bullets{padding-left:1.25rem;margin-bottom:.5rem}
.cs-bullets li{margin-bottom:.5rem;line-height:1.8;color:var(--text2);font-size:.875rem;word-break:keep-all}
.cs-bullets li strong{color:var(--text);font-weight:600}
.cs-rule{
  background:var(--success-light);
  border-left:3px solid var(--success);
  padding:.5rem .875rem;margin:.4rem 0;
  border-radius:0 6px 6px 0;
  font-size:.85rem;color:var(--text2);
  list-style:none;
}
.cs-vs{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:.625rem 0}
.cs-vs-item{
  padding:.875rem;border-radius:8px;
  background:var(--bg2);border:1px solid var(--border);font-size:.84rem;
}
.cs-vs-item h5{color:var(--primary);margin-bottom:.375rem;font-size:.875rem;font-weight:600}
.cs-vs-item p{color:var(--text2);line-height:1.65;word-break:keep-all}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted2)}
.empty::before{content:'📭';display:block;font-size:2rem;margin-bottom:1rem}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted2)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .main{padding:1rem}
  .hdr{padding:.75rem 1rem}
  .tabs{padding:0 .5rem}
  .tab{padding:.7rem .875rem;font-size:.8rem}
  .fr{grid-template-columns:1fr}
  .qtxt{font-size:1rem}
  .card{padding:1.25rem}
  .cs-vs{grid-template-columns:1fr}
  .sg{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
}
</style>
</head>
<body>
<div class="hdr">
    <h1>CISA <span>스터디 허브</span></h1>
    <div class="hdr-stats">
        <span>문제 수: <span class="v" id="sTotal">0</span></span>
        <span>정답률: <span class="v" style="color:var(--success)" id="sRate">0%</span></span>
    </div>
</div>
<div class="tabs">
    <div class="tab on" data-t="quiz">문제풀기</div>
    <div class="tab" data-t="concepts">개념정리</div>
    <div class="tab" data-t="memo">암기카드</div>
    <div class="tab" data-t="summary">요약</div>
    <div class="tab" data-t="wrong">오답노트</div>
    <div class="tab" data-t="cheat">치트시트</div>
    <div class="tab" data-t="add">추가</div>
</div>
<div class="main">
<div class="pane on" id="pQuiz">
    <div class="fbar" id="fbar"></div>
    <div id="qArea"></div>
    <div class="qact"><span class="qprog" id="qProg"></span><div style="display:flex;gap:.75rem"><button class="btn btn-o" onclick="A.shuffle()">섞기</button><button class="btn btn-p" onclick="A.next()">다음</button></div></div>
</div>
<div class="pane" id="pConcepts">
    <input type="text" class="csearch" placeholder="Search concepts... (stress test, SDLC, audit...)" id="cSearch" oninput="A.rConcepts()">
    <div id="cArea"></div>
</div>
<div class="pane" id="pMemo">
    <p style="color:var(--muted);margin-bottom:1.5rem;font-size:.875rem">카드를 클릭하면 정답을 확인할 수 있습니다.</p>
    <div id="mArea"></div>
</div>
<div class="pane" id="pSummary"><div id="sumArea"></div></div>
<div class="pane" id="pWrong"><div id="wArea"></div></div>
<div class="pane" id="pCheat"><div id="cheatArea"></div></div>
<div class="pane" id="pAdd">
    <div class="card">
        <h2 style="margin-bottom:1.5rem;font-size:1.15rem;color:var(--text)">새 문제 추가</h2>
        <div class="fr">
            <div class="fg"><label>Domain</label><select id="aD"><option value="1">1. IS Audit Process</option><option value="2">2. Governance & Management of IT</option><option value="3" selected>3. IS Acquisition, Development & Implementation</option><option value="4">4. IS Operations & Business Resilience</option><option value="5">5. Protection of Information Assets</option></select></div>
            <div class="fg"><label>Knowledge Statement</label><input type="text" id="aK" placeholder="e.g. 3A1 Project Governance"></div>
        </div>
        <div class="fg"><label>Question</label><textarea id="aQ"></textarea></div>
        <div class="fg"><label>Options (select correct)</label>
            <div class="oig"><input type="radio" name="co" value="0" checked><b style="width:20px">A.</b><input type="text" id="oA"></div>
            <div class="oig"><input type="radio" name="co" value="1"><b style="width:20px">B.</b><input type="text" id="oB"></div>
            <div class="oig"><input type="radio" name="co" value="2"><b style="width:20px">C.</b><input type="text" id="oC"></div>
            <div class="oig"><input type="radio" name="co" value="3"><b style="width:20px">D.</b><input type="text" id="oD"></div>
        </div>
        <div class="fg"><label>Explanation (Korean HTML)</label><textarea id="aE"></textarea></div>
        <div class="fg"><label>Reference</label><input type="text" id="aR"></div>
        <div class="fg"><label>Key Concepts (term|desc, comma or newline separated)</label><textarea id="aC"></textarea></div>
        <div style="display:flex;gap:.75rem"><button class="btn btn-s" onclick="A.addQ()">추가</button><button class="btn btn-o" onclick="A.clrForm()">초기화</button></div>
    </div>
    <div class="card" style="margin-top:1rem">
        <h2 style="margin-bottom:1rem;font-size:1.05rem;color:var(--text)">가져오기 / 내보내기</h2>
        <div class="fg"><textarea id="bJson" style="min-height:120px;font-family:monospace;font-size:.82rem"></textarea></div>
        <button class="btn btn-p" onclick="A.bulkImp()">가져오기</button>
        <button class="btn btn-o" onclick="A.exportJ()" style="margin-left:.5rem">내보내기</button>
    </div>
</div>
</div>

<script src="questions.js"></script>
<script>
const DN={"1":"IS Audit Process (IS 감사 프로세스)","2":"Governance & Management of IT (IT 거버넌스 및 관리)","3":"IS Acquisition, Development & Implementation (IS 획득, 개발 및 구현)","4":"IS Operations & Business Resilience (IS 운영 및 비즈니스 회복력)","5":"Protection of Information Assets (정보자산 보호)"};

class App{
constructor(){
    this.qs=JSON.parse(localStorage.getItem('cisa4'))||QUESTIONS;
    this.st=JSON.parse(localStorage.getItem('cisaSt4'))||{t:0,c:0};
    this.wl=JSON.parse(localStorage.getItem('cisaW4'))||[];
    this.ci=0;this.flt='all';this.fq=[...this.qs];this.ans=false;
    this.initTabs();this.initFilter();this.rQuiz();this.uStats();
}
save(){localStorage.setItem('cisa4',JSON.stringify(this.qs));localStorage.setItem('cisaSt4',JSON.stringify(this.st));localStorage.setItem('cisaW4',JSON.stringify(this.wl));}
initTabs(){document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');const id=t.dataset.t;document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.getElementById('p'+id[0].toUpperCase()+id.slice(1)).classList.add('on');if(id==='concepts')this.rConcepts();if(id==='memo')this.rMemo();if(id==='summary')this.rSummary();if(id==='wrong')this.rWrong();if(id==='cheat')this.rCheat();};});}
initFilter(){const b=document.getElementById('fbar');let h='<div class="fchip on" data-d="all">All</div><div class="fchip" data-d="starred">Starred</div>';for(const k of Object.keys(DN))h+=`<div class="fchip" data-d="${k}">D${k}</div>`;b.innerHTML=h;b.querySelectorAll('.fchip').forEach(c=>{c.onclick=()=>{b.querySelectorAll('.fchip').forEach(x=>x.classList.remove('on'));c.classList.add('on');this.flt=c.dataset.d;this.applyF();};});}
applyF(){if(this.flt==='all')this.fq=[...this.qs];else if(this.flt==='starred')this.fq=this.qs.filter(q=>q.starred);else this.fq=this.qs.filter(q=>q.domain===this.flt);this.ci=0;this.rQuiz();}

rQuiz(){
    const a=document.getElementById('qArea');
    if(!this.fq.length){a.innerHTML='<div class="empty">No questions. Add some!</div>';document.getElementById('qProg').textContent='';return;}
    const q=this.fq[this.ci],L=['A','B','C','D'];this.ans=false;
    a.innerHTML=`<div class="card"><div class="meta">
        <span class="bg bg-d">Domain ${q.domain}</span>
        ${q.ks?`<span class="bg bg-k">${q.ks}</span>`:''}
        ${q.reference?'<span class="bg bg-r">REF</span>':''}
        ${q.wrongCount>0?`<span class="bg bg-w">Missed ${q.wrongCount}x</span>`:''}
        <span class="bg bg-s" onclick="A.star(${q.id})">${q.starred?'★':'☆'}</span>
    </div>
    <div class="qtxt">${q.question}</div>
    <div class="opts">${q.options.map((o,i)=>`<div class="opt" onclick="A.pick(${i})"><div class="ol">${L[i]}</div><div class="ot">${o}</div></div>`).join('')}</div>
    <div class="expl" id="expl"><h3>해설</h3><div class="expl-c">${q.explanation||''}</div></div>
    <div class="rbox" id="rbox"><h4>📖 Reference</h4><ul>${(q.reference||'').split(',').map(r=>`<li>${r.trim()}</li>`).join('')}</ul></div>
    <div class="kcbox" id="kcbox"><h4>🔑 핵심 암기 포인트</h4>${(q.keyConcepts||[]).map(c=>{const[t,d]=c.split('|');return`<div class="ci"><strong>${t}</strong><br>${d||''}</div>`;}).join('')}</div>
    </div>`;
    document.getElementById('qProg').textContent=`${this.ci+1} / ${this.fq.length}`;
}
pick(i){
    if(this.ans)return;this.ans=true;const q=this.fq[this.ci],opts=document.querySelectorAll('.opt');
    opts.forEach(o=>o.classList.add('dis'));const rq=this.qs.find(x=>x.id===q.id);
    rq.attempts=(rq.attempts||0)+1;this.st.t++;
    if(i===q.correct){opts[i].classList.add('ok');rq.correctCount=(rq.correctCount||0)+1;this.st.c++;}
    else{opts[i].classList.add('no');opts[q.correct].classList.add('ok');rq.wrongCount=(rq.wrongCount||0)+1;if(!this.wl.includes(q.id))this.wl.push(q.id);}
    document.getElementById('expl').classList.add('show');document.getElementById('rbox').classList.add('show');document.getElementById('kcbox').classList.add('show');
    this.save();this.uStats();
}
next(){if(!this.fq.length)return;this.ci=(this.ci+1)%this.fq.length;this.rQuiz();}
shuffle(){for(let i=this.fq.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.fq[i],this.fq[j]]=[this.fq[j],this.fq[i]];}this.ci=0;this.rQuiz();}
star(id){const q=this.qs.find(x=>x.id===id);if(q){q.starred=!q.starred;this.save();this.rQuiz();}}
uStats(){document.getElementById('sTotal').textContent=this.qs.length;document.getElementById('sRate').textContent=(this.st.t?Math.round(this.st.c/this.st.t*100):0)+'%';}

rConcepts(){
    const a=document.getElementById('cArea'),s=(document.getElementById('cSearch').value||'').toLowerCase(),gc={};
    this.qs.forEach(q=>{const d=q.domain;if(!gc[d])gc[d]=[];(q.keyConcepts||[]).forEach(c=>{const[term,desc]=c.split('|');const txt=(term+' '+(desc||'')+' '+q.question).toLowerCase();if(!s||txt.includes(s)){if(!gc[d].find(x=>x.term===term))gc[d].push({term,desc:desc||'',ks:q.ks,ref:q.reference});}});});
    let h='';for(const[d,cs]of Object.entries(gc).sort()){if(!cs.length)continue;h+=`<div class="dsec"><div class="dhdr" onclick="this.classList.toggle('off');this.nextElementSibling.classList.toggle('off')"><h2>Domain ${d}: ${DN[d]}</h2><span class="tgl">▼</span></div><div class="dbody cb">${cs.map(c=>`<div class="ce"><h4>${c.term}</h4><p>${c.desc}</p><div class="tgs">${c.ks?`<span class="ctag">${c.ks}</span>`:''}${c.ref?`<span class="ctag" style="background:rgba(245,158,11,.12);color:var(--warn);border-color:rgba(245,158,11,.25)">📖 ${c.ref.split(',')[0].trim()}</span>`:''}</div></div>`).join('')}</div></div>`;}
    a.innerHTML=h||'<div class="empty">No concepts found.</div>';
}

rMemo(){
    const a=document.getElementById('mArea'),cards=[];
    this.qs.forEach(q=>{cards.push({q:q.question,a:`<strong>Answer: ${['A','B','C','D'][q.correct]}. ${q.options[q.correct]}</strong>`,d:q.domain});(q.keyConcepts||[]).forEach(c=>{const[t,desc]=c.split('|');if(desc)cards.push({q:t+' 이란?',a:desc,d:q.domain});});});
    if(!cards.length){a.innerHTML='<div class="empty">No cards.</div>';return;}
    a.innerHTML=cards.map(c=>`<div class="mc" onclick="this.classList.toggle('open')"><div style="display:flex;justify-content:space-between"><div class="mq">${c.q}</div><span class="bg bg-d" style="flex-shrink:0;height:fit-content">D${c.d}</span></div><div class="rh">클릭하여 정답 보기</div><div class="ma">${c.a}</div></div>`).join('');
}

rSummary(){
    const a=document.getElementById('sumArea'),kc=this.qs.reduce((n,q)=>n+(q.keyConcepts||[]).length,0);
    let h=`<div class="sg"><div class="sc"><div class="n" style="color:var(--pl)">${this.qs.length}</div><div class="l">Questions</div></div><div class="sc"><div class="n" style="color:var(--success)">${this.st.c}</div><div class="l">Correct</div></div><div class="sc"><div class="n" style="color:var(--danger)">${this.st.t-this.st.c}</div><div class="l">Wrong</div></div><div class="sc"><div class="n" style="color:var(--warn)">${this.st.t?Math.round(this.st.c/this.st.t*100):0}%</div><div class="l">Accuracy</div></div><div class="sc"><div class="n" style="color:var(--purple)">${kc}</div><div class="l">Concepts</div></div></div>`;
    const gr={};this.qs.forEach(q=>{if(!gr[q.domain])gr[q.domain]=[];gr[q.domain].push(q);});
    for(const[d,qs]of Object.entries(gr).sort()){
        h+=`<div class="dsec"><div class="dhdr" onclick="this.classList.toggle('off');this.nextElementSibling.classList.toggle('off')"><h2>Domain ${d}: ${DN[d]}</h2><span style="color:var(--muted)">${qs.length}문제</span></div><div class="dbody cb">${qs.map(q=>`<div class="ce" style="border-left-color:${q.wrongCount>0?'var(--danger)':'var(--success)'}"><h4>${q.question}</h4><p><strong style="color:var(--success)">정답: ${['A','B','C','D'][q.correct]}. ${q.options[q.correct]}</strong></p>${q.reference?`<p style="margin-top:.5rem;font-size:.85rem">📖 ${q.reference}</p>`:''}${(q.keyConcepts||[]).length?`<div style="margin-top:.75rem;padding:.75rem;background:rgba(139,92,246,.06);border-radius:6px"><p style="color:var(--purple);font-weight:600;font-size:.85rem;margin-bottom:.5rem">🔑 핵심 개념</p>${(q.keyConcepts||[]).map(c=>{const[t]=c.split('|');return`<p style="font-size:.85rem;margin-bottom:.3rem">- <strong>${t}</strong></p>`;}).join('')}</div>`:''}<p style="font-size:.8rem;color:var(--muted);margin-top:.5rem">Attempts: ${q.attempts||0} | O ${q.correctCount||0} | X ${q.wrongCount||0}</p></div>`).join('')}</div></div>`;
    }
    a.innerHTML=h;
}

rWrong(){
    const a=document.getElementById('wArea'),wqs=this.qs.filter(q=>this.wl.includes(q.id));
    if(!wqs.length){a.innerHTML='<div class="empty">No wrong answers yet!</div>';return;}
    let h='<p style="color:var(--muted);margin-bottom:1.5rem;font-size:.875rem">카드를 클릭하면 해설을 확인할 수 있습니다.</p>';
    wqs.forEach(q=>{h+=`<div class="card" style="cursor:pointer" onclick="this.querySelector('.expl').classList.toggle('show');this.querySelector('.kcbox').classList.toggle('show')"><div class="meta"><span class="bg bg-d">Domain ${q.domain}</span><span class="bg bg-w">Missed ${q.wrongCount}x</span></div><div class="qtxt" style="font-size:1.05rem">${q.question}</div><div class="expl"><h3>정답: ${['A','B','C','D'][q.correct]}. ${q.options[q.correct]}</h3><div class="expl-c">${q.explanation}</div></div><div class="kcbox"><h4>🔑 핵심 암기</h4>${(q.keyConcepts||[]).map(c=>{const[t,d]=c.split('|');return`<div class="ci"><strong>${t}</strong><br>${d||''}</div>`;}).join('')}</div></div>`;});
    h+='<button class="btn btn-o" onclick="A.clrW()" style="margin-top:1rem">오답 초기화</button>';
    a.innerHTML=h;
}
clrW(){this.wl=[];this.save();this.rWrong();}

addQ(){
    const q=document.getElementById('aQ').value.trim(),oA=document.getElementById('oA').value.trim(),oB=document.getElementById('oB').value.trim(),oC=document.getElementById('oC').value.trim(),oD=document.getElementById('oD').value.trim();
    if(!q||!oA||!oB||!oC||!oD){alert('Fill in question and all options.');return;}
    this.qs.push({id:Date.now(),domain:document.getElementById('aD').value,ks:document.getElementById('aK').value.trim(),question:q,options:[oA,oB,oC,oD],correct:parseInt(document.querySelector('input[name="co"]:checked').value),explanation:document.getElementById('aE').value.trim().replace(/\n/g,'<br>'),reference:document.getElementById('aR').value.trim(),keyConcepts:document.getElementById('aC').value.trim().split('\n').flatMap(l=>l.split(',')).map(s=>s.trim()).filter(Boolean),wrongCount:0,attempts:0,correctCount:0,starred:false});
    this.save();this.applyF();this.uStats();this.clrForm();alert('Added!');
}
clrForm(){['aQ','aK','oA','oB','oC','oD','aE','aR','aC'].forEach(id=>document.getElementById(id).value='');}
bulkImp(){const r=document.getElementById('bJson').value.trim();if(!r)return;try{const arr=JSON.parse(r);if(!Array.isArray(arr))throw new Error('Array needed');arr.forEach(q=>{this.qs.push({id:Date.now()+Math.random(),domain:q.domain||"1",ks:q.ks||"",question:q.question,options:q.options,correct:q.correct,explanation:q.explanation||"",reference:q.reference||"",keyConcepts:q.keyConcepts||[],wrongCount:0,attempts:0,correctCount:0,starred:false});});this.save();this.applyF();this.uStats();document.getElementById('bJson').value='';alert(`Imported ${arr.length}!`);}catch(e){alert('Error: '+e.message);}}
exportJ(){const d=JSON.stringify(this.qs,null,2),b=new Blob([d],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='cisa_questions.json';a.click();URL.revokeObjectURL(u);}

// ===== CHEAT SHEET =====
rCheat(){
    const a=document.getElementById('cheatArea');
    // Build cheat sheet from CHEAT_SHEET data in questions.js
    if(typeof CHEAT_SHEET!=='undefined' && CHEAT_SHEET.length){
        let h='<h2 style="margin-bottom:1.5rem;font-size:1.2rem;color:var(--text);font-weight:700">치트시트 — 시험 직전 요약 노트</h2>';
        CHEAT_SHEET.forEach(domain=>{
            h+=`<div class="cs-domain"><div class="cs-domain-title">Domain ${domain.id}: ${domain.name}</div>`;
            domain.topics.forEach(topic=>{
                h+=`<div class="cs-topic"><div class="cs-topic-title">${topic.icon||'📌'} ${topic.title}</div>`;
                if(topic.bullets){
                    h+=`<ul class="cs-bullets">${topic.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`;
                }
                if(topic.rules){
                    h+=topic.rules.map(r=>`<div class="cs-rule">${r}</div>`).join('');
                }
                if(topic.vs){
                    h+=`<div class="cs-vs">${topic.vs.map(v=>`<div class="cs-vs-item"><h5>${v.name}</h5><p>${v.desc}</p></div>`).join('')}</div>`;
                }
                if(topic.table){
                    h+=`<table style="width:100%;border-collapse:collapse;margin:.5rem 0;font-size:.85rem"><tr>${topic.table.headers.map(th=>`<th style="background:rgba(59,130,246,.15);color:var(--pl);padding:.5rem .75rem;border:1px solid var(--border);text-align:left">${th}</th>`).join('')}</tr>${topic.table.rows.map(row=>`<tr>${row.map(td=>`<td style="padding:.5rem .75rem;border:1px solid var(--border);color:var(--muted)">${td}</td>`).join('')}</tr>`).join('')}</table>`;
                }
                h+=`</div>`;
            });
            h+=`</div>`;
        });
        a.innerHTML=h;
    } else {
        a.innerHTML='<div class="empty">Cheat Sheet data not loaded yet.</div>';
    }
}

// Sync new questions from questions.js that aren't in localStorage yet
syncNew(){
    const ids=new Set(this.qs.map(q=>q.id));
    let added=0;
    QUESTIONS.forEach(q=>{if(!ids.has(q.id)){this.qs.push(q);added++;}});
    if(added){this.save();this.applyF();this.uStats();}
}
}
const A=new App();
A.syncNew();
</script>
</body>
</html>
